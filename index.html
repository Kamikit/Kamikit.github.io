<li>在用户层面有3种命令队列（<em>Command Queue</em>）：<strong>复制队列（Copy Queue）</strong>、<strong>计算队列（Compute Queue）</strong>和<strong>3D队列（3D Queue）</strong>，它们可以并行地执行，并且通过栅栏（Fence）、信号（Signal）或屏障（Barrier）来等待和同步。</li>
<li>在GPU硬件层面有3种引擎：<strong>复制引擎（Copy Engine）</strong>、<strong>计算引擎（Compute Engine）</strong>和<strong>3D引擎（3D Engine）</strong>，它们也可以并行地执行，并且通过栅栏（Fence）、信号（Signal）或屏障（Barrier）来等待和同步。</li>
<li>其中，3D Queue可以驱动GPU硬件的3种引擎，Compute Queue只能驱动Compute Engine和Copy Engine，Copy Queue仅可以驱动Copy Engine。</li>
<li>在CPU层面，可以有若干个线程，每个线程可创建产生若干个命令列表（Command List），每个命令列表可进入3种Command Queue的其中一种。当这些命令被GPU执行时，每种指令列表里的命令会压入不同的GPU引擎，以便它们并行地执行。如图：<br><img src="https://github.com/Kamikit/picx-images-hosting/raw/master/1.4g4igi9vmu.webp"></li>
</ul></div><span class="read-more">READ MORE +</span></object></a><a class="recent-post" href="/2024/11/10/UE-C++-%E9%A2%84%E5%A4%87%E7%9F%A5%E8%AF%86/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/UE/">UE</a></object><object><a href="/categories/UE/C/">C++</a></object></span><span class="tags"><object><a href="/tags/UE/">UE</a></object><object><a href="/tags/C/">C++</a></object></span><time datetime="2024-11-10T06:54:02.000Z">2024-11-10</time></div><h1 class="recent-title">UE C++ 预备知识</h1><div class="recent-excerpt"><hr><h3 id="Lambda表达式（C-11）"><a href="#Lambda表达式（C-11）" class="headerlink" title="Lambda表达式（C++11）"></a>Lambda表达式（C++11）</h3><ul>

</ul></div><span class="read-more">READ MORE +</span></object></a><a class="recent-post" href="/2024/09/09/slang/"><object><div class="recent-info"><span class="categories"><object><a href="/categories/shader/">shader</a></object></span><span class="tags"><object><a href="/tags/shader-language/">shader language</a></object></span><time datetime="2024-09-09T15:30:06.000Z">2024-09-09</time></div><h1 class="recent-title">slang</h1><div class="recent-excerpt"><hr><h4 id="2-3-GPU架构特性："><a href="#2-3-GPU架构特性：" class="headerlink" title="2.3 GPU架构特性："></a>2.3 GPU架构特性：</h4><ul>
<li>SIMD架构：避免分歧控制流(if)，因此类似 dynamic dispatching 和虚函数不被支持</li>
<li>多线程：切换线程的上下文尽可能轻量化</li>
<li>高度流水线化：尽可能减少状态的改变，避免因为状态改变而产生的流水线 stall 以及 CPU传递硬件指令而产生的额外开销</li>
